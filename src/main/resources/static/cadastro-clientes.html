<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous"
    >
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >
</head>
<body class="bg-primary bg-opacity-10">
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark ">
        <div class="container-fluid">
            <a class="ms-2 navbar-brand fw-lighter fst-italic" href="#" class=""><i class="bi bi-person-lines-fill"></i>
                CRM</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-5">
                    <li class="nav-item">
                        <a class="nav-link" href="/index.html"><i class="bi bi-list"></i> Ver clientes</a>
                    </li>
                    <li>
                        <a class="nav-link" href="/cadastro-clientes.html"> <i class="bi bi-person-plus-fill"></i> Novo
                            cliente</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main class="container py-5 d-flex align-items-center flex-column bg-white container shadow-lg min-vh-100">

    <h2 id="title-page" class="h3 mb-4">Cadastrar novo cliente</h2>

    <form id="form-cadastro"
          class="d-flex flex-column justify-content-center align-items-center p-4 border border-primary border rounded shadow-sm"
          style="--bs-border-opacity: .3;">

        <div class=" mb-4 w-100">
            <span class="h5 line mb-5"> Dados pessoais</span>

            <div class="row g-5 justify-content-between mb-3">
                <div class="col-md">
                    <label class="form-label obrigatorio" for="nome">Nome:</label>
                    <input class="form-control" placeholder="Digite o nome completo" type="text" id="nome"
                           name="nome"
                           required>
                </div>

                <div class="col-sm-5">
                    <label class="form-label obrigatorio" for="cpf">CPF:</label>
                    <input class="form-control" type="text" id="cpf" name="cpf" placeholder="Ex.: 123.456.789-01"
                           required>
                </div>

            </div>
            <div class="row g-5 justify-content-between">
                <div class="col-md-3">
                    <label class="form-label obrigatorio" for="dataNascimento">Data de nascimento:</label>
                    <input class="form-control" type="date" id="dataNascimento" name="dataNascimento" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label obrigatorio" for="genero">Gênero:</label>
                    <select class="form-control form-select" id="genero" name="genero" required>
                        <option value="" selected>-- Selecione um gênero --</option>
                        <option value="0">Masculino</option>
                        <option value="1">Feminino</option>
                        <option value="2">Outro</option>
                        <option value="3">Prefiro não dizer</option>

                    </select>
                </div>

            </div>
        </div>

        <div class="mb-4 w-100">
            <span class="h5 mb-2 line">Contato</span>

            <div class="row g-3 justify-content-between">
                <div class="col-md-4">
                    <label class="form-label obrigatorio" for="telefone">Telefone:</label>
                    <input class="form-control" type="text" id="telefone" name="telefone"
                           placeholder="Ex.: (13) 9 1234-4321" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label obrigatorio" for="email">Email:</label>
                    <input class="form-control" type="email" id="email" name="email" placeholder="Digite o email"
                           required>
                </div>

            </div>
        </div>

        <div class="mb-5 w-100">
            <span class="h5 mb-2 line">Endereço</span>

            <div>
                <div class="row justify-content-between mb-3">
                    <div class="col-md-2">
                        <label class="form-label obrigatorio" for="cep">CEP:</label>
                        <input class="form-control" type="text" id="cep" name="cep" placeholder="01.000-000"
                               required>
                    </div>

                    <div class="col-md">
                        <label class="form-label obrigatorio" for="logradouro">Endereço:</label>
                        <input class="form-control" type="text" id="logradouro" name="logradouro"
                               placeholder="Digite o endereço" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label obrigatorio" for="numeroCasa">Nº:</label>
                        <input class="form-control" type="text" id="numeroCasa" name="numeroCasa" placeholder="Ex.: 001"
                               required>
                    </div>
                </div>
                <div class="row justify-content-between">
                    <div class="col-md">
                        <label class="form-label" for="complemento">Complemento:</label>
                        <input class="form-control" type="text" id="complemento" name="complemento"
                               placeholder="Ex.: Apto 234">
                    </div>

                    <div class="col-md">
                        <label class="form-label obrigatorio" for="bairro">Bairro:</label>
                        <input class="form-control" type="text" id="bairro" name="bairro"
                               placeholder="Informe o bairro"
                               required>
                    </div>

                    <div class="col-md">
                        <label class="form-label obrigatorio" for="cidade">Cidade:</label>
                        <input class="form-control" type="text" id="cidade" name="cidade"
                               placeholder="Informe a cidade"
                               required>
                    </div>

                    <div class="col-auto">
                        <label class="form-label obrigatorio" for="estado">UF:</label>
                        <select class="form-control form-select" name="estado" id="estado">
                            <option value="">---</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>

                </div>


            </div>
        </div>

        <button id="btnSalvarCadastroCliente" class="btn btn-success w-25" type="submit"  >Salvar</button>
    </form>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <span class="rounded me-2 bg-success" style="width: 20px; height: 20px;"></span>
                <strong class="me-auto" id="toastHeader">
                </strong>
                <small> agora </small>

                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>

            <div class="toast-body text-wrap" id="toastBody">
                Cliente cadastrado com sucesso!
            </div>
        </div>
    </div>

</main>
<footer class="text-center p-4 bg-dark  bg-gradient">
    <span class="text-white">Desenvolvido com ❤️ por <a class="link-underline link-underline-opacity-0 link-success"
                                                        href="https://github.com/Luc033">Luc033</a></span>
</footer>

<script src="logic.js" type="application/javascript"></script>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
></script>

</body>
</html>
