<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <title>Listagem de clientes</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
    >
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >
</head>
<body class="bg-primary bg-opacity-10">
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark ">
        <div class="container-fluid">
            <a class="ms-2 navbar-brand fw-lighter fst-italic" href="#" class=""><i class="bi bi-person-lines-fill"></i> CRM</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-5">
                    <li class="nav-item">
                        <a class="nav-link" href="/index.html"><i class="bi bi-list"></i> Ver clientes</a>
                    </li>
                    <li>
                        <a class="nav-link" href="/cadastro-clientes.html"> <i class="bi bi-person-plus-fill"></i> Novo
                            cliente</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main class="container py-5 d-flex align-items-between flex-column bg-white container shadow-lg min-vh-100">
    <h2 class="h3 mb-4">Listagem de clientes</h2>

    <div class="table-responsive">

    <table id="tblClientes" class="table table-hover align-middle mb-0 text-center">
        <colgroup>
            <col style="width: 35%">
            <col style="width: 30%">
            <col style="width: 20%">
            <col style="width: 10%">
            <col style="width: 5%">
        </colgroup>
        <thead class="table-light">
        <tr>
            <td>Cliente</td>
            <td>Contato</td>
            <td>Cidade</td>
            <td>Status</td>
            <td>Ações</td>
        </tr>

        </thead>

        <tbody id="tblCustomers">

        </tbody>

    </table>
    </div>
    <nav class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item disabled"><a class="page-link" href="#">Anterior</a></li>
            <li class="page-item active"><a class="page-link " href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#" >2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" onclick="proximaPaginaListaClientes()">Próximo</a></li>
        </ul>
    </nav>
</main>
<footer class="text-center p-4 bg-dark  bg-gradient">
    <span class="text-white">Desenvolvido com ❤️ por <a class="link-underline link-underline-opacity-0 link-success" href="https://github.com/Luc033">Luc033</a></span>
</footer>

<div class="modal fade" id="modalConfirmacao" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h1 class="modal-title fs-5" id="modalConfirmacaoTitulo">
                    Confirmar ação
                </h1>

                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Fechar">
                </button>
            </div>

            <div class="modal-body" id="modalConfirmacaoMensagem">
                Deseja continuar?
            </div>

            <div class="modal-footer">
                <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <button
                        type="button"
                        class="btn btn-danger"
                        id="btnModalConfirmar">
                    Confirmar
                </button>
            </div>

        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-header">
            <span class="rounded me-2 bg-success" style="width: 20px; height: 20px;"></span>
            <strong class="me-auto" id="toastHeader">
            </strong>
            <small> agora </small>

            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Fechar"></button>
        </div>

        <div class="toast-body text-wrap" id="toastBody">
            Cliente cadastrado com sucesso!
        </div>
    </div>
</div>
<script src="logic.js" type="application/javascript"></script>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
</script>
</body>
</html>
